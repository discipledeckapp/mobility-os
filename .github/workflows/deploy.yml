name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "20"

jobs:
  # Deploy control plane first — api-core depends on it for lifecycle calls
  deploy-control-plane:
    name: Deploy api-control-plane
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl --silent --show-error --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API_CONTROL_PLANE }}"

  deploy-backends:
    name: Deploy api-core & api-intelligence
    runs-on: ubuntu-latest
    needs: deploy-control-plane
    strategy:
      matrix:
        hook:
          - secret: RENDER_DEPLOY_HOOK_API_CORE
          - secret: RENDER_DEPLOY_HOOK_API_INTELLIGENCE
    steps:
      - name: Trigger Render deploy
        run: |
          curl --silent --show-error --fail \
            -X POST "${{ secrets[matrix.hook.secret] }}"

  deploy-tenant-web:
    name: Deploy tenant-web (Vercel)
    runs-on: ubuntu-latest
    needs: deploy-backends
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_TENANT_WEB_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }}

  deploy-control-plane-web:
    name: Deploy control-plane-web (Vercel)
    runs-on: ubuntu-latest
    needs: deploy-backends
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CONTROL_PLANE_WEB_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
