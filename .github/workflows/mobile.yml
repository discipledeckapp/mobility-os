name: Mobile Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      submit_to_testflight:
        description: Auto-submit the iOS production build to TestFlight
        required: true
        default: false
        type: boolean

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "20"

jobs:
  build:
    name: EAS Build (${{ inputs.platform }}, ${{ inputs.profile }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build
        working-directory: apps/mobile-ops
        run: |
          if [ "${{ inputs.submit_to_testflight }}" = "true" ] && [ "${{ inputs.platform }}" != "ios" ]; then
            echo "TestFlight submit is only supported for iOS builds."
            exit 1
          fi

          if [ "${{ inputs.submit_to_testflight }}" = "true" ] && [ "${{ inputs.profile }}" != "production" ]; then
            echo "TestFlight submit requires the production EAS profile."
            exit 1
          fi

          EXTRA_ARGS=""
          if [ "${{ inputs.submit_to_testflight }}" = "true" ]; then
            EXTRA_ARGS="--auto-submit"
          fi

          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait \
            ${EXTRA_ARGS}
