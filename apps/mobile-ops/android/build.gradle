// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

def azureMavenUsername =
  (findProperty('AZURE_MAVEN_USERNAME') ?: System.getenv('AZURE_MAVEN_USERNAME'))
def azureMavenPassword =
  (findProperty('AZURE_MAVEN_PASSWORD') ?: System.getenv('AZURE_MAVEN_PASSWORD'))

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
    // Azure AI Vision Face Liveness Detection SDK (YouVerify native liveness).
    maven {
      url 'https://pkgs.dev.azure.com/msface/SDK/_packaging/AzureAIVision/maven/v1'
      if (azureMavenUsername && azureMavenPassword) {
        credentials {
          username azureMavenUsername
          password azureMavenPassword
        }
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
